<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1b3a2f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>家計簿</title>
<style>
  :root{
    --ink:#10221b; --paper:#f3efe4; --paper2:#ece6d6;
    --moss:#2f6a4f; --moss-d:#1b3a2f; --leaf:#6fae7e;
    --clay:#c5563f; --gold:#d9a441; --line:#cdc4ad;
    --shadow:0 1px 0 rgba(0,0,0,.04),0 6px 22px rgba(27,58,47,.10);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",system-ui,sans-serif;
    background:var(--paper); color:var(--ink);
    padding-bottom:96px; -webkit-font-smoothing:antialiased;
  }
  /* ---- header ---- */
  header{
    background:
      radial-gradient(120% 140% at 100% 0%, #2f6a4f 0%, #1b3a2f 60%);
    color:#f3efe4; padding:22px 20px 18px;
    border-bottom-left-radius:22px; border-bottom-right-radius:22px;
    position:sticky; top:0; z-index:20; box-shadow:var(--shadow);
  }
  .brand{display:flex;align-items:baseline;gap:10px}
  .brand h1{margin:0;font-size:21px;letter-spacing:.06em;font-weight:800}
  .brand .yr{font-size:13px;opacity:.75;font-variant-numeric:tabular-nums}
  .balance{margin-top:14px;display:flex;align-items:flex-end;gap:6px}
  .balance .label{font-size:11px;opacity:.7;letter-spacing:.12em}
  .balance .amt{font-size:34px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1}
  .balance .yen{font-size:15px;opacity:.8;margin-bottom:3px}
  .mini{display:flex;gap:18px;margin-top:12px}
  .mini div{font-size:11px;opacity:.85}
  .mini b{display:block;font-size:15px;font-weight:700;margin-top:2px;font-variant-numeric:tabular-nums}
  .mini .in b{color:#bfe8c8}.mini .out b{color:#f3b9ab}
  /* ---- tabs ---- */
  main{padding:16px 16px 0;max-width:560px;margin:0 auto}
  .view{display:none;animation:fade .25s ease}
  .view.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  h2.sec{font-size:13px;letter-spacing:.14em;color:var(--moss-d);
    margin:6px 2px 12px;font-weight:800;text-transform:none}
  h2.sec::before{content:"";display:inline-block;width:18px;height:2px;
    background:var(--clay);vertical-align:middle;margin-right:8px}
  /* ---- form card ---- */
  .card{background:#fff;border:1px solid var(--line);border-radius:16px;
    padding:16px;box-shadow:var(--shadow);margin-bottom:16px}
  label{display:block;font-size:11px;letter-spacing:.08em;color:#6b6450;
    margin:0 0 6px 2px;font-weight:700}
  input,select{width:100%;font-size:16px;padding:12px 13px;border:1.5px solid var(--line);
    border-radius:11px;background:var(--paper);color:var(--ink);font-family:inherit;
    appearance:none;-webkit-appearance:none}
  input:focus,select:focus{outline:none;border-color:var(--moss);background:#fff}
  .row{display:flex;gap:10px}.row>div{flex:1}
  .amount-in{font-size:26px;font-weight:800;text-align:right;font-variant-numeric:tabular-nums;
    color:var(--moss-d);letter-spacing:.02em}
  .chips{display:flex;flex-wrap:wrap;gap:7px;margin:2px 0 4px}
  .chip{font-size:12.5px;padding:8px 12px;border-radius:999px;border:1.5px solid var(--line);
    background:#fff;color:#4a4636;font-weight:600;cursor:pointer;transition:.15s}
  .chip.on{background:var(--moss);color:#fff;border-color:var(--moss);
    box-shadow:0 3px 10px rgba(47,106,79,.32)}
  .save{width:100%;margin-top:4px;padding:15px;border:none;border-radius:13px;
    background:linear-gradient(180deg,#2f6a4f,#235740);color:#fff;font-size:16px;
    font-weight:800;letter-spacing:.08em;cursor:pointer;box-shadow:0 6px 16px rgba(27,58,47,.3)}
  .save:active{transform:translateY(1px)}
  /* ---- list ---- */
  .day{font-size:11px;letter-spacing:.1em;color:#8a8164;margin:16px 4px 7px;font-weight:700;
    display:flex;justify-content:space-between}
  .day .dsum{color:var(--clay)}
  .item{background:#fff;border:1px solid var(--line);border-radius:13px;padding:12px 14px;
    margin-bottom:8px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow)}
  .item .dot{width:9px;height:9px;border-radius:50%;flex:none}
  .item .meta{flex:1;min-width:0}
  .item .prod{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .item .cat{font-size:11px;color:#8a8164;margin-top:2px}
  .item .cost{font-size:16px;font-weight:800;font-variant-numeric:tabular-nums}
  .item .del{color:#bbb;font-size:20px;padding:0 2px;cursor:pointer;flex:none}
  .empty{text-align:center;color:#9a927c;font-size:13px;padding:40px 10px;line-height:1.8}
  /* ---- charts ---- */
  canvas{width:100%!important;height:auto!important}
  .legend{display:flex;flex-wrap:wrap;gap:8px 14px;margin-top:12px}
  .legend span{font-size:11.5px;color:#4a4636;display:flex;align-items:center;gap:5px}
  .legend i{width:10px;height:10px;border-radius:2px;display:inline-block}
  .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
  .stat{background:#fff;border:1px solid var(--line);border-radius:14px;padding:13px 14px;box-shadow:var(--shadow)}
  .stat .k{font-size:10.5px;letter-spacing:.1em;color:#8a8164;font-weight:700}
  .stat .v{font-size:21px;font-weight:800;margin-top:4px;font-variant-numeric:tabular-nums}
  /* ---- export ---- */
  .exp-btn{width:100%;padding:14px;border:1.5px solid var(--moss);border-radius:13px;
    background:#fff;color:var(--moss-d);font-size:14px;font-weight:800;letter-spacing:.06em;
    cursor:pointer;margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:8px}
  .exp-btn.solid{background:var(--moss);color:#fff;border-color:var(--moss)}
  .hint{font-size:11.5px;color:#8a8164;line-height:1.7;background:var(--paper2);
    border-radius:12px;padding:12px 14px;margin-top:4px}
  .hint code{background:#fff;padding:1px 5px;border-radius:4px;font-size:11px}
  /* ---- tabbar ---- */
  nav{position:fixed;left:0;right:0;bottom:0;z-index:30;
    background:rgba(243,239,228,.92);backdrop-filter:blur(12px);
    border-top:1px solid var(--line);display:flex;padding:6px 6px calc(6px + env(safe-area-inset-bottom))}
  nav button{flex:1;background:none;border:none;padding:8px 0 6px;cursor:pointer;
    color:#9a927c;font-size:10.5px;font-weight:700;letter-spacing:.04em;
    display:flex;flex-direction:column;align-items:center;gap:3px}
  nav button .ic{font-size:20px;line-height:1}
  nav button.on{color:var(--moss-d)}
  nav button.fab{flex:0 0 auto}
  nav button.fab .ic{width:52px;height:52px;border-radius:50%;
    background:linear-gradient(180deg,#c5563f,#a8442f);color:#fff;
    display:flex;align-items:center;justify-content:center;font-size:28px;
    box-shadow:0 6px 16px rgba(168,68,47,.4);margin-top:-22px}
  .toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--moss-d);color:#fff;padding:11px 20px;border-radius:999px;font-size:13px;
    font-weight:600;opacity:0;transition:.3s;z-index:40;pointer-events:none;box-shadow:var(--shadow)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<header>
  <div class="brand"><h1>家計簿</h1><span class="yr" id="hdrMonth">2026年</span></div>
  <div class="balance">
    <span class="label">今月の収支</span>
  </div>
  <div class="balance">
    <span class="amt" id="balAmt">0</span><span class="yen">円</span>
  </div>
  <div class="mini">
    <div class="in">収入<b id="inAmt">0</b></div>
    <div class="out">支出<b id="outAmt">0</b></div>
    <div>貯蓄率<b id="rateAmt">–</b></div>
  </div>
</header>

<main>
  <!-- ===== INPUT ===== -->
  <section class="view active" id="v-input">
    <h2 class="sec">支出を記録</h2>
    <div class="card">
      <label>金額</label>
      <input class="amount-in" id="f-cost" type="number" inputmode="numeric" placeholder="0" />
      <div style="height:14px"></div>
      <label>項目</label>
      <div class="chips" id="catChips"></div>
      <div style="height:10px"></div>
      <label>商品・店名</label>
      <input id="f-prod" list="prodList" placeholder="例：吉野家" />
      <datalist id="prodList"></datalist>
      <div style="height:14px"></div>
      <div class="row">
        <div>
          <label>日付</label>
          <input id="f-date" type="date" />
        </div>
      </div>
      <div style="height:16px"></div>
      <button class="save" id="saveBtn">記録する</button>
    </div>
  </section>

  <!-- ===== LIST ===== -->
  <section class="view" id="v-list">
    <h2 class="sec">支出の履歴</h2>
    <div class="row" style="margin-bottom:14px">
      <div>
        <label>表示する月</label>
        <select id="monthPick"></select>
      </div>
    </div>
    <div id="listWrap"></div>
  </section>

  <!-- ===== CHARTS ===== -->
  <section class="view" id="v-chart">
    <h2 class="sec">グラフで見る</h2>
    <div class="stat-grid">
      <div class="stat"><div class="k">年間支出</div><div class="v" id="s-exp">0</div></div>
      <div class="stat"><div class="k">月平均支出</div><div class="v" id="s-avg">0</div></div>
    </div>
    <div class="card">
      <label>月別 収入 vs 支出</label>
      <canvas id="barC" height="220"></canvas>
    </div>
    <div class="card">
      <label>支出の構成比（項目別）</label>
      <canvas id="pieC" height="220"></canvas>
      <div class="legend" id="pieLeg"></div>
    </div>
  </section>

  <!-- ===== EXPORT ===== -->
  <section class="view" id="v-export">
    <h2 class="sec">Excelと連携</h2>
    <div class="card">
      <button class="exp-btn solid" id="csvAll">📤 全データをCSV出力</button>
      <button class="exp-btn" id="csvMonth">📅 表示中の月だけ出力</button>
      <div class="hint">
        出力したCSVをExcelの <code>CSV取込</code> マクロで読み込むと、
        日付から自動で各「○月支出」シートに振り分けられます。<br>
        形式：<code>日付,項目,商品,費用</code>
      </div>
    </div>
    <h2 class="sec">バックアップ</h2>
    <div class="card">
      <button class="exp-btn" id="backup">💾 バックアップを保存(JSON)</button>
      <button class="exp-btn" id="restoreBtn">📥 バックアップを復元</button>
      <input type="file" id="restoreFile" accept=".json" style="display:none" />
      <div class="hint">データはこの端末のブラウザ内に保存されます。機種変更前にバックアップを。</div>
    </div>
  </section>
</main>

<nav>
  <button data-v="input" class="on"><span class="ic">✎</span>入力</button>
  <button data-v="list"><span class="ic">☰</span>履歴</button>
  <button data-v="chart"><span class="ic">📊</span>グラフ</button>
  <button data-v="export"><span class="ic">⇄</span>連携</button>
</nav>
<div class="toast" id="toast"></div>

<script>
const CATS=["食費（購入品）","食費（外食）","食費（飲料）","交通費","日用品","医療・薬","娯楽・趣味","衣服・美容","交際費","その他変動費"];
const CAT_COLORS={"食費（購入品）":"#2f6a4f","食費（外食）":"#6fae7e","食費（飲料）":"#a7d3a0","交通費":"#d9a441","日用品":"#c5563f","医療・薬":"#8a6cc4","娯楽・趣味":"#e08a5c","衣服・美容":"#5c9ec4","交際費":"#b8607a","その他変動費":"#9a927c"};
const SEED_PRODS=["相鉄ローゼン","吉野家","すき家","松屋","マクドナルド","セブンイレブン","丸亀製麺","東秀","ラーメン","ユンケル","セイムス","電車","バス","タクシー","定期","映画料金","お菓子類"];
const KEY="kakeibo_data_v1";

let state=JSON.parse(localStorage.getItem(KEY)||'{"rows":[],"income":{}}');
let pickedCat=CATS[0];

const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];
const yen=n=>Math.round(n).toLocaleString("ja-JP");
const todayISO=()=>new Date().toISOString().slice(0,10);
function save(){localStorage.setItem(KEY,JSON.stringify(state));}
function toast(m){const t=$("#toast");t.textContent=m;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),1600);}

/* ---- nav ---- */
$$("nav button").forEach(b=>b.onclick=()=>{
  $$("nav button").forEach(x=>x.classList.remove("on"));b.classList.add("on");
  $$(".view").forEach(v=>v.classList.remove("active"));
  $("#v-"+b.dataset.v).classList.add("active");
  if(b.dataset.v==="chart")drawCharts();
  if(b.dataset.v==="list")renderList();
});

/* ---- input form ---- */
function buildChips(){
  const w=$("#catChips");w.innerHTML="";
  CATS.forEach(c=>{
    const el=document.createElement("div");
    el.className="chip"+(c===pickedCat?" on":"");el.textContent=c;
    el.onclick=()=>{pickedCat=c;buildChips();};
    w.appendChild(el);
  });
}
function buildProdList(){
  const seen=new Set(SEED_PRODS);
  state.rows.forEach(r=>seen.add(r.prod));
  $("#prodList").innerHTML=[...seen].filter(Boolean).map(p=>`<option value="${p}">`).join("");
}
$("#saveBtn").onclick=()=>{
  const cost=parseFloat($("#f-cost").value);
  const prod=$("#f-prod").value.trim();
  const date=$("#f-date").value||todayISO();
  if(!cost||cost<=0){toast("金額を入力してください");return;}
  state.rows.push({date,cat:pickedCat,prod:prod||pickedCat,cost});
  save();
  $("#f-cost").value="";$("#f-prod").value="";
  buildProdList();refreshHeader();
  toast("記録しました ✓");
};

/* ---- header summary ---- */
function curMonth(){return (window._pickMonth)||todayISO().slice(0,7);}
function refreshHeader(){
  const m=todayISO().slice(0,7);
  const rows=state.rows.filter(r=>r.date.slice(0,7)===m);
  const out=rows.reduce((s,r)=>s+r.cost,0);
  const inc=state.income[m]||0;
  $("#hdrMonth").textContent=m.replace("-","年")+"月";
  $("#balAmt").textContent=yen(inc-out);
  $("#inAmt").textContent=yen(inc);
  $("#outAmt").textContent=yen(out);
  $("#rateAmt").textContent=inc>0?Math.round((inc-out)/inc*100)+"%":"–";
}

/* ---- list ---- */
function monthsWithData(){
  const s=new Set(state.rows.map(r=>r.date.slice(0,7)));
  s.add(todayISO().slice(0,7));
  return [...s].sort().reverse();
}
function buildMonthPick(){
  const sel=$("#monthPick");sel.innerHTML="";
  monthsWithData().forEach(m=>{
    const o=document.createElement("option");o.value=m;
    o.textContent=m.replace("-","年")+"月";sel.appendChild(o);
  });
  sel.onchange=()=>{window._pickMonth=sel.value;renderList();};
}
function renderList(){
  const m=$("#monthPick").value||todayISO().slice(0,7);
  const rows=state.rows.map((r,i)=>({...r,i})).filter(r=>r.date.slice(0,7)===m)
    .sort((a,b)=>b.date.localeCompare(a.date));
  const wrap=$("#listWrap");
  if(!rows.length){wrap.innerHTML='<div class="empty">まだ記録がありません。<br>「入力」タブから追加しましょう。</div>';return;}
  const byDay={};rows.forEach(r=>{(byDay[r.date]=byDay[r.date]||[]).push(r);});
  let html="";
  Object.keys(byDay).sort().reverse().forEach(d=>{
    const items=byDay[d];const dsum=items.reduce((s,r)=>s+r.cost,0);
    const dd=new Date(d);const wd=["日","月","火","水","木","金","土"][dd.getDay()];
    html+=`<div class="day"><span>${d.slice(5).replace("-","/")}（${wd}）</span><span class="dsum">−${yen(dsum)}円</span></div>`;
    items.forEach(r=>{
      html+=`<div class="item">
        <span class="dot" style="background:${CAT_COLORS[r.cat]||"#999"}"></span>
        <div class="meta"><div class="prod">${esc(r.prod)}</div><div class="cat">${r.cat}</div></div>
        <div class="cost">−${yen(r.cost)}</div>
        <span class="del" data-i="${r.i}">×</span>
      </div>`;
    });
  });
  wrap.innerHTML=html;
  $$(".del").forEach(b=>b.onclick=()=>{
    if(confirm("この記録を削除しますか？")){state.rows.splice(+b.dataset.i,1);save();renderList();refreshHeader();}
  });
}
function esc(s){return (s+"").replace(/[<>&]/g,c=>({"<":"&lt;",">":"&gt;","&":"&amp;"}[c]));}

/* ---- charts (canvas, no library) ---- */
function drawCharts(){
  const year=todayISO().slice(0,4);
  const months=[...Array(12)].map((_,i)=>String(i+1).padStart(2,"0"));
  const exp=months.map(mm=>state.rows.filter(r=>r.date.slice(0,7)===`${year}-${mm}`).reduce((s,r)=>s+r.cost,0));
  const inc=months.map(mm=>state.income[`${year}-${mm}`]||0);
  const totalExp=exp.reduce((a,b)=>a+b,0);
  const nz=exp.filter(x=>x>0).length||1;
  $("#s-exp").textContent=yen(totalExp);
  $("#s-avg").textContent=yen(totalExp/nz);
  drawBars(months,inc,exp);
  drawPie(year);
}
function drawBars(labels,inc,exp){
  const cv=$("#barC"),ctx=cv.getContext("2d");
  const W=cv.width=cv.clientWidth*2,H=cv.height=440;ctx.scale(1,1);
  ctx.clearRect(0,0,W,H);
  const pad=46,bw=(W-pad*1.4)/labels.length;
  const max=Math.max(...inc,...exp,1);
  ctx.font="20px sans-serif";ctx.fillStyle="#8a8164";
  [0,.5,1].forEach(f=>{const y=H-30-(H-70)*f;ctx.strokeStyle="#e5dfce";ctx.beginPath();ctx.moveTo(pad,y);ctx.lineTo(W,y);ctx.stroke();
    ctx.fillText(yen(max*f),2,y+6);});
  labels.forEach((m,i)=>{
    const x=pad+bw*i+bw*0.16;
    const hi=(H-70)*(inc[i]/max),he=(H-70)*(exp[i]/max);
    ctx.fillStyle="#6fae7e";ctx.fillRect(x,H-30-hi,bw*0.3,hi);
    ctx.fillStyle="#c5563f";ctx.fillRect(x+bw*0.34,H-30-he,bw*0.3,he);
    ctx.fillStyle="#8a8164";ctx.textAlign="center";ctx.fillText(parseInt(m),x+bw*0.34,H-8);ctx.textAlign="left";
  });
  $("#pieLeg").previousElementSibling; // noop
}
function drawPie(year){
  const tot={};
  state.rows.filter(r=>r.date.slice(0,4)===year).forEach(r=>{tot[r.cat]=(tot[r.cat]||0)+r.cost;});
  const entries=Object.entries(tot).filter(e=>e[1]>0).sort((a,b)=>b[1]-a[1]);
  const cv=$("#pieC"),ctx=cv.getContext("2d");
  const W=cv.width=cv.clientWidth*2,H=cv.height=440;ctx.clearRect(0,0,W,H);
  const cx=W/2,cy=H/2,rad=Math.min(W,H)/2-20;
  const sum=entries.reduce((s,e)=>s+e[1],0)||1;let a=-Math.PI/2;
  if(!entries.length){ctx.fillStyle="#9a927c";ctx.font="22px sans-serif";ctx.textAlign="center";ctx.fillText("データがありません",cx,cy);ctx.textAlign="left";$("#pieLeg").innerHTML="";return;}
  entries.forEach(([c,v])=>{
    const ang=v/sum*Math.PI*2;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,rad,a,a+ang);ctx.closePath();
    ctx.fillStyle=CAT_COLORS[c]||"#999";ctx.fill();
    ctx.strokeStyle="#fff";ctx.lineWidth=4;ctx.stroke();a+=ang;
  });
  ctx.beginPath();ctx.arc(cx,cy,rad*0.55,0,Math.PI*2);ctx.fillStyle="#fff";ctx.fill();
  ctx.fillStyle="#10221b";ctx.font="bold 26px sans-serif";ctx.textAlign="center";
  ctx.fillText(yen(sum),cx,cy-2);ctx.font="16px sans-serif";ctx.fillStyle="#8a8164";ctx.fillText("円",cx,cy+22);ctx.textAlign="left";
  $("#pieLeg").innerHTML=entries.map(([c,v])=>`<span><i style="background:${CAT_COLORS[c]||"#999"}"></i>${c} ${Math.round(v/sum*100)}%</span>`).join("");
}

/* ---- export ---- */
function downloadCSV(rows,name){
  let csv="日付,項目,商品,費用\n";
  rows.slice().sort((a,b)=>a.date.localeCompare(b.date)).forEach(r=>{
    csv+=`${r.date},${r.cat},${r.prod},${Math.round(r.cost)}\n`;
  });
  const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8"});
  triggerDL(blob,name);
}
function triggerDL(blob,name){
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=name;a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
}
$("#csvAll").onclick=()=>{if(!state.rows.length){toast("データがありません");return;}downloadCSV(state.rows,"家計簿_全データ.csv");toast("CSVを出力しました");};
$("#csvMonth").onclick=()=>{const m=$("#monthPick").value||todayISO().slice(0,7);const r=state.rows.filter(x=>x.date.slice(0,7)===m);if(!r.length){toast("この月のデータがありません");return;}downloadCSV(r,`家計簿_${m}.csv`);toast("CSVを出力しました");};
$("#backup").onclick=()=>{triggerDL(new Blob([JSON.stringify(state)],{type:"application/json"}),"家計簿_backup.json");toast("バックアップを保存しました");};
$("#restoreBtn").onclick=()=>$("#restoreFile").click();
$("#restoreFile").onchange=e=>{const f=e.target.files[0];if(!f)return;const rd=new FileReader();rd.onload=()=>{try{state=JSON.parse(rd.result);save();initAll();toast("復元しました ✓");}catch{toast("ファイルを読めませんでした");}};rd.readAsText(f);};

/* ---- init ---- */
function initAll(){buildChips();buildProdList();buildMonthPick();$("#f-date").value=todayISO();refreshHeader();renderList();}
initAll();
</script>
</body>
</html>
